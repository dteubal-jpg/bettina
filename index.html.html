<title>Bettina Teubal — Galería de Arte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f5f0ea;font-family:'Jost',sans-serif;font-weight:300;color:#2a2118;min-height:100vh}
  .hero{text-align:center;padding:3rem 2rem 1.8rem;border-bottom:.5px solid #c8bfb0;margin-bottom:1.8rem}
  .hero-eyebrow{font-size:10px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:#8a7968;margin-bottom:.5rem}
  .hero-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;font-style:italic;color:#2a2118;line-height:1.1;margin-bottom:.4rem}
  .hero-sub{font-size:11px;font-weight:200;letter-spacing:.18em;text-transform:uppercase;color:#9a8c7c}
  .year-tabs{display:flex;justify-content:center;margin-bottom:1rem}
  .year-tab{background:transparent;border:.5px solid #c8bfb0;border-right:none;padding:.5rem 1.4rem;font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:#8a7968;cursor:pointer;transition:background .18s,color .18s}
  .year-tab:last-child{border-right:.5px solid #c8bfb0}
  .year-tab.active{background:#2a2118;color:#f5f0ea;border-color:#2a2118}
  .parts-row{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;padding:0 1.5rem .9rem}
  .part-btn{background:transparent;border:.5px solid #d5ccbf;padding:.35rem .75rem;font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:#9a8c7c;cursor:pointer;transition:background .18s,color .18s}
  .part-btn:hover{background:#ede7de;color:#2a2118}
  .part-btn.active{background:#4a3f32;color:#f5f0ea;border-color:#4a3f32}
  .count-bar{text-align:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#b0a496;padding:.2rem 0 1.2rem}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;padding:0 1.5rem 3rem;max-width:1100px;margin:0 auto}
  .art-card{background:#fff;cursor:pointer;transition:transform .3s,box-shadow .3s;opacity:0;animation:fadeIn .4s ease forwards}
  .art-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(42,33,24,.1)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .art-frame{padding:7px 7px 0;background:#f9f5f0;border:.5px solid #e0d8cd}
  .art-img-wrap{overflow:hidden;background:#e8e0d5;aspect-ratio:3/4}
  .art-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
  .art-card:hover .art-img-wrap img{transform:scale(1.04)}
  .art-info{padding:.65rem .75rem .75rem;border:.5px solid #e0d8cd;border-top:none;background:#fff}
  .art-serie{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#9a8c7c;font-weight:400;margin-bottom:.12rem}
  .art-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;font-style:italic;color:#2a2118;line-height:1.2;margin-bottom:.15rem}
  .art-date{font-size:9px;color:#b0a496;font-weight:200;letter-spacing:.05em}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(12,8,5,.94);z-index:1000;align-items:center;justify-content:center;padding:1.2rem}
  .lightbox.open{display:flex}
  .lb-inner{display:flex;gap:2rem;align-items:flex-start;max-width:860px;width:100%;animation:lbIn .22s ease}
  @keyframes lbIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
  .lb-img-wrap{flex:1;min-width:0;border:.5px solid rgba(255,255,255,.09);padding:7px;background:rgba(255,255,255,.03)}
  .lb-img-wrap img{width:100%;display:block;max-height:72vh;object-fit:contain}
  .lb-meta{width:165px;flex-shrink:0;padding-top:.4rem}
  .lb-ey{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,185,165,.5);margin-bottom:.45rem;font-weight:400}
  .lb-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;font-weight:300;color:#f5f0ea;line-height:1.25;margin-bottom:.25rem}
  .lb-artist{font-size:10px;color:rgba(232,224,213,.38);font-weight:200;letter-spacing:.06em;margin-bottom:.9rem}
  .lb-date{font-size:9px;color:rgba(200,185,165,.4);letter-spacing:.1em;text-transform:uppercase;border-top:.5px solid rgba(255,255,255,.07);padding-top:.6rem;margin-bottom:1rem}
  .lb-link{display:inline-block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,185,165,.4);text-decoration:none;border:.5px solid rgba(200,185,165,.18);padding:.3rem .65rem;transition:color .18s,border-color .18s}
  .lb-link:hover{color:#f5f0ea;border-color:rgba(200,185,165,.5)}
  .lb-close{position:fixed;top:.9rem;right:1.2rem;background:none;border:none;color:rgba(232,224,213,.3);font-size:1.3rem;cursor:pointer;z-index:1001;transition:color .18s;font-family:'Jost',sans-serif;font-weight:200}
  .lb-close:hover{color:#f5f0ea}
  .lb-nav{display:flex;gap:.5rem;margin-top:1rem}
  .lb-nav button{background:none;border:.5px solid rgba(200,185,165,.16);color:rgba(200,185,165,.38);font-size:15px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s}
  .lb-nav button:hover{border-color:rgba(200,185,165,.5);color:#f5f0ea}
  .lb-counter{font-size:9px;color:rgba(200,185,165,.3);letter-spacing:.07em;margin-top:.6rem}
  .footer{text-align:center;padding:1.5rem;border-top:.5px solid #c8bfb0}
  .footer a{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a8c7c;text-decoration:none}
  .footer a:hover{color:#2a2118}
  @media(max-width:540px){
    .lb-inner{flex-direction:column}.lb-meta{width:100%}
    .gallery-grid{grid-template-columns:repeat(2,1fr);gap:.6rem;padding:0 .6rem 2rem}
    .hero-title{font-size:2rem}
  }
</style>

// Aplanar todas las obras
function buildWorks(parts) {
  const all = [];
  parts.forEach(p => {
    p.imgs.forEach(img => {
      all.push({
        thumb: B + img.k + '/' + img.th + '/' + encodeURIComponent(img.fn),
        full:  B + img.k + '/s2000/' + encodeURIComponent(img.fn),
        title: img.fn.replace(/\.(jpg|png)/i,''),
        date: p.date,
        serie: 'Parte ' + p.id,
        year: p.year,
        partId: p.id,
        link: p.link
      });
    });
  });
  return all;
}

const ALL_WORKS = buildWorks(PARTS);
let filtered = [...ALL_WORKS];
let activeYear = 'all';
let activePart = 'all';
let lbIdx = 0;

function buildPartButtons(year) {
  const row = document.getElementById('parts-row');
  row.innerHTML = '';
  const relevant = PARTS.filter(p => year === 'all' || p.year === year);
  const allBtn = document.createElement('button');
  allBtn.className = 'part-btn active';
  allBtn.textContent = 'Todas las partes';
  allBtn.onclick = () => { activePart = 'all'; render(); document.querySelectorAll('.part-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); };
  row.appendChild(allBtn);
  relevant.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'part-btn';
    btn.textContent = 'Parte ' + p.id;
    btn.dataset.pid = p.id;
    btn.onclick = () => {
      activePart = p.id;
      render();
      document.querySelectorAll('.part-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
}

function setYear(year, btn) {
  activeYear = year;
  activePart = 'all';
  document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildPartButtons(year);
  render();
}

function render() {
  filtered = ALL_WORKS.filter(w => {
    const yearOk = activeYear === 'all' || w.year === activeYear;
    const partOk = activePart === 'all' || w.partId === activePart;
    return yearOk && partOk;
  });
  document.getElementById('count-bar').textContent = filtered.length + ' obras';
  const grid = document.getElementById('gallery');
  grid.innerHTML = '';
  filtered.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'art-card';
    card.style.animationDelay = Math.min(i * 0.04, 0.6) + 's';
    card.innerHTML = `
      <div class="art-frame"><div class="art-img-wrap">
        <img src="${w.thumb}" alt="${w.title}" loading="lazy">
      </div></div>
      <div class="art-info">
        <div class="art-serie">${w.serie} · ${w.date}</div>
        <div class="art-title">${w.title}</div>
      </div>`;
    card.addEventListener('click', () => openLb(i));
    grid.appendChild(card);
  });
}

function openLb(idx) {
  lbIdx = idx;
  const w = filtered[idx];
  document.getElementById('lb-img').src = w.full;
  document.getElementById('lb-title').textContent = w.title;
  document.getElementById('lb-date').textContent = w.date + ' · ' + w.serie;
  document.getElementById('lb-link').href = w.link;
  document.getElementById('lb-counter').textContent = (idx+1) + ' / ' + filtered.length;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb(e, force) {
  if (force || e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function navLb(dir) {
  lbIdx = (lbIdx + dir + filtered.length) % filtered.length;
  const w = filtered[lbIdx];
  const img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.style.transition = 'opacity 0.15s';
  setTimeout(() => {
    img.src = w.full;
    document.getElementById('lb-title').textContent = w.title;
    document.getElementById('lb-date').textContent = w.date + ' · ' + w.serie;
    document.getElementById('lb-link').href = w.link;
    document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + filtered.length;
    img.style.opacity = '1';
  }, 150);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'Escape') closeLb(null, true);
});

buildPartButtons('all');
render();
</script>
